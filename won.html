<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shell Game — You Won!</title>
  <style>html{background:linear-gradient(160deg,#87ceeb 0%,#b8e4f7 40%,#f2d98a 70%,#c9a84c 100%)}</style>
  <link rel="stylesheet" crossorigin href="./assets/style-BQnMmiEY.css">
</head>
<body class="page-won">

  <canvas id="fireworks"></canvas>

  <div class="screen-center won-content">
    <h1 class="won-title">you won.</h1>
    <p class="won-body">turns out the worms were fine.</p>
    <div class="button-group">
      <a href="./index.html" class="btn btn-primary">← play anyway</a>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("fireworks");
    const ctx = canvas.getContext("2d");

    canvas.style.position = "fixed";
    canvas.style.inset = "0";
    canvas.style.pointerEvents = "none";
    canvas.style.zIndex = "0";

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener("resize", resize);

    const particles = [];

    const COLORS = [
      "#ff6b6b", "#ffd93d", "#6bcb77", "#4d96ff",
      "#ff922b", "#cc5de8", "#f06595", "#ffffff"
    ];

    function spawnFirework() {
      const x = Math.random() * canvas.width;
      const y = Math.random() * canvas.height * 0.6; // top 60% of screen
      const color = COLORS[Math.floor(Math.random() * COLORS.length)];
      const count = 60 + Math.floor(Math.random() * 40);

      for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 / count) * i + Math.random() * 0.3;
        const speed = 2 + Math.random() * 4;
        particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          alpha: 1,
          color,
          size: 2 + Math.random() * 2,
          gravity: 0.08 + Math.random() * 0.04,
          decay: 0.012 + Math.random() * 0.008,
        });
      }
    }

    // Launch fireworks on a randomized interval
    let nextLaunch = 0;
    function scheduleLaunch() {
      nextLaunch = Date.now() + 400 + Math.random() * 600;
    }
    scheduleLaunch();

    // Initial burst so it's instant on load
    spawnFirework();
    spawnFirework();

    function loop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (Date.now() >= nextLaunch) {
        spawnFirework();
        scheduleLaunch();
      }

      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x  += p.vx;
        p.y  += p.vy;
        p.vy += p.gravity;
        p.vx *= 0.98;
        p.alpha -= p.decay;

        if (p.alpha <= 0) { particles.splice(i, 1); continue; }

        ctx.save();
        ctx.globalAlpha = p.alpha;
        ctx.fillStyle   = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      requestAnimationFrame(loop);
    }

    loop();
  </script>

</body>
</html>
